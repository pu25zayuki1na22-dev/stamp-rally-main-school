<!DOCTYPE html>
 <html>
 <head>
 <meta charset="UTF-8">
 <title>ハコアナビ</title>
<style>
 body{
   text-align:center;
   font-family:sans-serif;
   background: linear-gradient(to bottom, #e0f7fa, #ffffff);
 }
h2{ color:#333; }
button{
   background:#2196f3;
   color:white;
   border:none;
   border-radius:10px;
   box-shadow:0 4px 8px rgba(0,0,0,0.2);
   font-size:20px;
   padding:15px;
   margin:10px;
 }
button:active{ transform:scale(0.95); }
#score{ color:#ff9800; }
#collection{
   display:flex;
   flex-wrap:wrap;
   justify-content:center;
 }


#collection img{
   width:100px;
   margin:5px;
   border-radius:10px;
 }
#startScreen{
   position:fixed;
   width:100%;
   height:100%;
   background:#2196f3;
   color:white;
   display:flex;
   flex-direction:column;
   justify-content:center;
   align-items:center;

 }

 #startImage{
  position:absolute;
  bottom:10px;
  right:10px;
  width:200px; /* サイズ調整 */
  opacity:0.9; /* 少しなじませる */
}

#game{ display:none; }
#map{
   height:400px;
   width:90%;
   margin:20px auto;
   border-radius:10px;
 }

 #clearScreen{
  display:none;
  flex-direction:column;
  align-items:center;
}

/* スタンプ */
#stampPopup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:9999; /* ←追加（最前面） */
}

 #stampContent{
   background:white;
   padding:30px;
   border-radius:15px;
   animation: pop 0.5s;
 }
@keyframes pop{
   0%{ transform:scale(0.5); opacity:0; }
   100%{ transform:scale(1); opacity:1; }
 }
/* キラキラ */
 .sparkle{
   position:fixed;
   width:8px;
   height:8px;
   background:gold;
   border-radius:50%;
   animation: sparkleAnim 1s forwards;
 }
@keyframes sparkleAnim{
   0%{ opacity:1; }
   100%{ transform:translateY(-100px); opacity:0; }
 }
 </style>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
 <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
 <body>
   
 <div id="startScreen">
   <h1>観光スタンプラリー</h1>
  <p>📍 位置情報をONにしてください</p>
   <p>🚶‍♂️ 実際に歩いて近づいて現在地チェックを押してください</p>
   <p>⚠️ 歩きスマホは危険！安全に楽しもう</p>
  <button onclick="startGame()">スタート</button>
  <img id="startImage" src="https://i.imgur.com/eQFQswd.png" />
 </div>
<div id="game">
   <button onclick="getLocation()">現在地チェック</button>
   <h2 id="score">現在のポイント: 0</h2>
   <p id="result"></p>
   <div id="map"></div>
  <h3>スタンプコレクション</h3>
   <div id="collection"></div>

  <h3>ジャンル別一覧</h3>
<div id="genreList"></div>

  <h3 id="infoName"></h3>
   <p id="infoPoint"></p>
   <p id="infoDesc"></p>
  <button id="resetBtn" onclick="resetGame()" style="display:none;">
  もう一度遊ぶ
</button>

 </div>
<div id="stampPopup">
   <div id="stampContent"></div>
 </div>
<script>
let stampCount = 0
 let marker
 let map
 let gettingStamp = false
 
let circle
   
  let rareAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3")
 
 rareAudio.preload = "auto"
// 距離
 function getDistance(a,b,c,d){
   const R=6371000
   const dLat=(c-a)*Math.PI/180
   const dLng=(d-b)*Math.PI/180
   const x=Math.sin(dLat/2)**2+
     Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
     Math.sin(dLng/2)**2
   return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
 }
// スタート
function startGame(){
  document.getElementById("startScreen").style.display="none"
  document.getElementById("game").style.display="block"

  

 // ② 少し遅れて地図作る（重要！）
   setTimeout(()=>{
     map = L.map('map').setView([41.7687,140.7288],13)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
       .addTo(map)
    setSpots()
    showGenres()
   }, 100)
 }
// スポット
  const spots = [
{name:"市立函館高校",lat:41.79450604936817,lng:140.76358217606838,point:50,got:false,desc:"函館市唯一の市立高校",stamp:"https://i.imgur.com/WyAkpLk.png",rare:true,genre:"みんなの高校"},
{name:"最古のコンクリート電柱",lat:41.76509795739517,lng:140.71654809597842,point:20,got:false,desc:"日本最古のコンクリート電柱、今とは少し形も違います",stamp:"https://i.imgur.com/3sCou2Q.png",genre:"最古の〇〇"},
{name:"桜ヶ丘通り",lat:41.78471170062522,lng:140.76280284166694,point:20,got:false,desc:"桜のアーチが美しく、１００本物桜の木がある",stamp:"https://i.imgur.com/ypBsosS.png",rare:true,genre:"絶景"},
{name:"ティーショップ夕日",lat:41.7667247858931,lng:140.6955032300196,point:30,got:false,desc:"海を眺めながら、ゆっくり過ごせる",stamp:"https://i.imgur.com/eYBAxAa.png",rare:true,genre:"食べ物"},
{name:"函館八幡宮",lat:41.75412382252375,lng:140.70988615700801,point:30,got:false,desc:"美しい眺め、俳優さんが結婚式を上げたことで有名です",stamp:"https://i.imgur.com/5wjFwu3.png",genre:"寺社"},
{name:"千秋庵　総本家",lat:41.80135368917188,lng:140.76827878769018,point:30,got:false,desc:"どら焼きや元祖　山親爺が有名",stamp:"https://i.imgur.com/sUhXdSa.png",genre:"食べ物"},
{name:"湯の川温泉足湯",lat:41.77996162820263,lng:140.785709557008,point:30,got:false,desc:"湯の川温泉のお湯に気軽に入ることが出来ます",stamp:"https://i.imgur.com/cKlSJL1.png",genre:"体験スポット"},
{name:"湯倉神社",lat:41.782590413733686,lng:140.791063857008,point:30,got:false,desc:"いろいろな種類のお守りおみくじがある",stamp:"https://i.imgur.com/RbnKaSl.png",genre:"寺社"},
{name:"銀月",lat:41.78024472657789,lng:140.78722208399637,point:30,got:false,desc:"団子で有名！地元の人気店なので売り切れに注意",stamp:"https://i.imgur.com/TNOh39f.png",rare:true,genre:"食べ物"},
{name:"函館自由市場",lat:41.77354174218063,lng:140.73440902632584,point:30,got:false,desc:"市民に愛されている市場、プロの御用達です！",stamp:"https://i.imgur.com/KNoU0Ia.png",genre:"市民の市場"},
{name:"旧金森洋物店",lat:41.766461301032905,lng:140.71300404536075,point:30,got:false,desc:"和洋折衷な珍しい建物で歴史が学べます！",stamp:"https://i.imgur.com/fNkEGOn.png",genre:"歴史"}
]

function setSpots(){
   spots.forEach(s=>{
    // ピン作成
     s.marker = L.marker([s.lat, s.lng]).addTo(map)
    // 地図に名前だけ表示
     s.marker.bindPopup("<b>" + s.name + "</b>")
    // タップで下に詳細
     s.marker.on('click', function(){
       document.getElementById("infoName").textContent = s.name
       document.getElementById("infoPoint").textContent = "+" + s.point + "pt"
       document.getElementById("infoDesc").textContent = s.desc
     })
  })
 }

 function showGenres(){
  const area = document.getElementById("genreList")
  area.innerHTML = ""

  const genres = {}

  // グループ分け
  spots.forEach(s=>{
    if(!s.genre) return

    const gList = Array.isArray(s.genre) ? s.genre : [s.genre]

    gList.forEach(g=>{
      if(!genres[g]) genres[g] = []
      genres[g].push(s.name)
    })
  })

  // 表示
  for(let g in genres){
    const title = document.createElement("h4")
    title.textContent = "◆ " + g

    const list = document.createElement("p")
    list.textContent = genres[g].join("・")

    area.appendChild(title)
    area.appendChild(list)
  }
}


 function bigSparkle(){
  for(let i=0;i<100;i++){
    const s=document.createElement("div")
    s.className="sparkle"
    s.style.left=Math.random()*window.innerWidth+"px"
    s.style.top=Math.random()*window.innerHeight+"px"
    document.body.appendChild(s)
    setTimeout(()=>s.remove(),1000)
  }
}

// 位置取得
 function getLocation(){
  navigator.geolocation.getCurrentPosition(checkPosition)
}

 // キラキラ
 function sparkle(){
   for(let i=0;i<20;i++){
     const s=document.createElement("div")
     s.className="sparkle"
     s.style.left=Math.random()*window.innerWidth+"px"
     s.style.top=Math.random()*window.innerHeight+"px"
     document.body.appendChild(s)
     setTimeout(()=>s.remove(),1000)
   }
 }
// スタンプ表示
 function showStamp(s){
  const box = document.getElementById("stampContent")
   box.innerHTML = ""
  const title = document.createElement("h2")
   title.textContent = s.rare ? "🌟レアスタンプGET！" : "スタンプGET！"
  const text = document.createElement("p")
   text.textContent = s.name + " +" + s.point + "pt"
  const img = document.createElement("img")
   img.src = s.stamp || "https://cdn-icons-png.flaticon.com/512/190/190411.png"
   img.style.width = "150px"
   img.style.display = "block"
   img.style.margin = "15px auto"
  box.appendChild(title)
   box.appendChild(text)
   box.appendChild(img)
  document.getElementById("stampPopup").style.display = "flex"
  if(s.rare){
     rareAudio.currentTime = 0
     rareAudio.play()
     sparkle()
   }else{
        }
  setTimeout(()=>{
  document.getElementById("stampPopup").style.display = "none"
  gettingStamp = false
},2000)

 }
    
 // 判定
 function checkPosition(pos){
   const lat = pos.coords.latitude
   const lng = pos.coords.longitude
  if(marker) map.removeLayer(marker)
   marker = L.marker([lat,lng], {
   icon: L.icon({
     iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
     iconSize: [32, 32]
   })
 }).addTo(map)
  map.setView([lat,lng],15)
  // 🔵 半径円
   if(circle){
     map.removeLayer(circle)
   }
  circle = L.circle([lat, lng], {
     radius: 200,
     color: 'blue',
     fillColor: '#2196f3',
     fillOpacity: 0.2
   }).addTo(map)
  let found = false
  spots.forEach(s=>{
     if(getDistance(lat,lng,s.lat,s.lng) < 200){
     if(!s.got && !gettingStamp){
       gettingStamp = true

         s.got = true
         stampCount += s.point
        // 🔴 取得したら赤ピンに変更
         s.marker.setIcon(L.icon({
           iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
           iconSize: [32, 32]
         }))
        // ⭐ スタンプ画像追加
         const img = document.createElement("img")
         img.src = s.stamp || "https://cdn-icons-png.flaticon.com/512/190/190411.png"
         document.getElementById("collection").appendChild(img)
        // ⭐ ポイント更新
         document.getElementById("score").textContent = "現在のポイント: " + stampCount
        // ⭐ ポップアップ表示
         showStamp(s)
        // ⭐ 下の説明更新
         document.getElementById("infoName").textContent = s.name
         document.getElementById("infoPoint").textContent = "+" + s.point + "pt"
         document.getElementById("infoDesc").textContent = s.desc
       }
      found = true
     }
   })
  if(!found){
     document.getElementById("result").textContent = "まだ近くにスポットがないよ"
   }
// 全部取得チェック
if(spots.every(s => s.got)){
  document.getElementById("clearScreen").style.display = "flex"
  document.getElementById("resetBtn").style.display = "inline-block"

  bigSparkle() // ←ここに変更
}

 }
 
  function resetGame(){
  // ポイントリセット
   stampCount = 0
   document.getElementById("score").textContent = "現在のポイント: 0"
  // コレクション削除
   document.getElementById("collection").innerHTML = ""
  // 説明リセット
   document.getElementById("infoName").textContent = ""
   document.getElementById("infoPoint").textContent = ""
   document.getElementById("infoDesc").textContent = ""
  // スポット初期化
   spots.forEach(s=>{
     s.got = false
    // 🔵 青ピンに戻す
     s.marker.setIcon(L.icon({
       iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
       iconSize: [32, 32]
     }))
   })
  // クリア画面消す
   document.getElementById("clearScreen").style.display = "none"

   document.getElementById("resetBtn").style.display = "none"

 }
</script>
 <div id="clearScreen" style="
 display:none;
 margin-top:20px;
 ">
   <h1>クリア！🎉</h1>
   <img id="clearImage" src="https://i.imgur.com/Eb9djZR.png" style="width:90%; max-width:400px;">
</div>
  
 
   
 </body>
 </html>
